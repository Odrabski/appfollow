app = "appfollow"
primary_region = "iad"

[build]

[env]
  PORT = "3001"
  NODE_ENV = "production"
  DATA_DIR = "/data"
  REPORT_CRON = "30 3 * * *"   # 6:30 AM Israel time (UTC+3 summer)

[[mounts]]
  source = "appfollow_data"
  destination = "/data"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
